mapper_orchestrator:
  ros__parameters:
    max_align_retries: 3
    map_stabilize_wait_sec: 3.0
    loop_closure_timeout_sec: 30.0
    min_coverage_to_stop: 0.95
    slam_control_service_2d: slam_manager_2d/slam_control
    slam_control_service_3d: slam_manager_3d/slam_control

wall_aligner:
  ros__parameters:
    # 정렬 동작 파라미터
    tolerance_deg: 0.2
    max_attempts: 10
    spin_speed_deg_s: 40.0
    spin_accel_deg_s2: 30.0
    spin_server: spin
    cooldown_ms: 300.0           # Spin 완료 후 안정화 대기 (ms)
    min_inlier_ratio: 0.3        # wall_detector inlier_ratio 최소 임계
    wall_fresh_timeout_ms: 5000.0
    wall_topic: wall_detector/longest_wall
    reference_frame: odom        # 매핑 시작 전이라 map 없음
    robot_frame: base_link
    # 동일 벽 추적 (큰 각도 수렴 안정화)
    wall_identity_tol_deg: 25.0  # 첫 검출 벽의 world 각도 ±tol 안의 벽만 채택

map_alignment_checker:
  ros__parameters:
    hough_rho: 1.0
    hough_theta: 0.017453292
    hough_threshold: 50
    hough_min_line_length: 20.0
    hough_max_line_gap: 5.0

exploration_planner:
  ros__parameters:
    max_linear_speed: 0.2
    acceleration: 0.3
