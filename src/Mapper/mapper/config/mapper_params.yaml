mapper_orchestrator:
  ros__parameters:
    max_align_retries: 3
    map_stabilize_wait_sec: 3.0
    loop_closure_timeout_sec: 30.0
    min_coverage_to_stop: 0.95
    slam_control_service_2d: slam_manager_2d/slam_control
    slam_control_service_3d: slam_manager_3d/slam_control

wall_detector:
  ros__parameters:
    # 최장선 선정 전 후보 필터 — 근거리 선반/원거리 노이즈 제거
    min_line_len_m: 3.0      # 기본 0.8 → 3.0 (짧은 선반 단일 행 제외)
    min_distance_m: 1.5      # lidar 원점 1.5m 이내 물체 제외
    max_distance_m: 25.0     # 월드 경계(20m) 넘는 노이즈 제외
    # 중복 Hough 선분 merge (Codex 권고) — 같은 벽의 분리 검출을 하나로 통합
    merge_angle_tol_deg: 3.0     # 같은 벽 간주 각도 임계
    merge_distance_tol_m: 0.2    # 같은 벽 간주 수직거리 임계
    # Ranking: length × inlier_ratio (composite score, code 고정)

wall_aligner:
  ros__parameters:
    # 상대 회전(spin relative=true) 기반 — TF / odom / map 불필요
    tolerance_deg: 0.2
    max_attempts: 10
    spin_speed_deg_s: 40.0
    spin_accel_deg_s2: 30.0
    spin_server: spin
    cooldown_ms: 300.0             # Spin 완료 후 안정화 대기 (ms)
    min_inlier_ratio: 0.3          # wall_detector inlier_ratio 최소 임계
    wall_fresh_timeout_ms: 5000.0
    # 외벽/선반 분리 — bag 분석(N=1461)에서 length≥11&dist≥10은 32%가 외벽,
    # 5~9m는 대부분 선반/내부벽. 선반 길이 ~5m이므로 length 8m+로 여유있게 배제.
    min_wall_length_m: 8.0
    min_wall_distance_m: 5.0
    wall_topic: wall_detector/longest_wall

map_alignment_checker:
  ros__parameters:
    hough_rho: 1.0
    hough_theta: 0.017453292
    hough_threshold: 50
    hough_min_line_length: 20.0
    hough_max_line_gap: 5.0

exploration_planner:
  ros__parameters:
    max_linear_speed: 0.2
    acceleration: 0.3
